      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
      - name: Clear test app cache
        run: tests/Fixtures/app/console cache:clear --ansi
      - name: Export OpenAPI documents
        run: |
          mkdir -p build/out/openapi
          tests/Fixtures/app/console api:openapi:export --yaml -o build/out/openapi/openapi_v3.yaml
      - name: Validate OpenAPI documents
        run: |
          npm i -g @quobix/vacuum
          vacuum lint -r tests/Fixtures/app/ruleset.yaml build/out/openapi/openapi_v3.yaml -d --ignore-array-circle-ref --ignore-polymorph-circle-ref -b --no-clip

  laravel:
    name: Laravel (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php: ${{ fromJSON(github.event_name == 'pull_request' && '["8.2","8.5"]' || '["8.2","8.3","8.4","8.5"]') }}
        include:
          - php: '8.5'
            coverage: true
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, pdo_sqlite
          ini-values: memory_limit=-1
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link . --permanent
          composer api-platform/laravel update
      - name: PHP version tweaks
        run: |
          composer run-script build
          composer run-script test
        working-directory: 'src/Laravel'

  laravel-e2e:
    name: Laravel E2E installation (PHP 8.5)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, pdo_sqlite
          ini-values: memory_limit=-1
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link . --permanent
      - name: Setup laravel project
        run: |
          composer global require laravel/installer
          laravel new test-api-platform-install --pest --no-interaction
      - name: Install api-platform/laravel
        run: |
          composer require laravel/framework:"^13.0" --no-update
          composer global link ../src/Laravel --permanent
          composer config minimum-stability dev
          composer config prefer-stable true
          composer require api-platform/laravel:"@dev" -W
          php ./artisan api-platform:install
        working-directory: 'test-api-platform-install'
      - name: Smoke test
        run: |
          php ./artisan serve &
          sleep 2
          curl -f http://127.0.0.1:8000/api || exit 1
          kill %1
        working-directory: 'test-api-platform-install'
