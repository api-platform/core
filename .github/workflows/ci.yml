name: CI

on:
  push:
    branches:
      - main
      - '[0-9]+.[0-9]+'
    paths-ignore:
      - '**.md'
      - '**.rst'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.rst'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  COMPOSER_ROOT_VERSION: "5.0.x-dev"

jobs:
  architecture:
    name: Check components interdependencies
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.5'
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, bcmath, curl, openssl, mbstring, mongodb
          ini-values: memory_limit=-1
          tools: pecl, composer:2.9.8
          coverage: none
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - run: composer validate
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
          composer require --dev doctrine/mongodb-odm-bundle
      - run: composer check-dependencies

  php-cs-fixer:
    name: PHP CS Fixer (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.3'
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, bcmath, curl, openssl, mbstring, mongodb
          ini-values: memory_limit=-1
          tools: php-cs-fixer
          coverage: none
      - name: Run PHP-CS-Fixer fix
        run: php-cs-fixer fix --dry-run --diff --ansi --show-progress=none

  lint-container:
    name: Lint Container
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.5'
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, bcmath, curl, openssl, mbstring
          ini-values: memory_limit=-1
          tools: composer:2.9.8
          coverage: none
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
      - name: Run container lint
        run: tests/Fixtures/app/console lint:container

  upgrade-filter:
    name: Upgrade Filter Codemod
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.5'
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, bcmath, curl, openssl, mbstring
          ini-values: memory_limit=-1
          tools: composer
          coverage: none
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
      - name: Codemod unit tests
        run: vendor/bin/phpunit src/Symfony/Tests/Bundle/Command
      # The #[ApiFilter] fixtures are already migrated in the tree, so --force only re-skips the
      # special cases (name conversion, service/#[ApiFilter] key overlap); it must not error.
      - name: Codemod force run
        run: tests/Fixtures/app/console api:upgrade-filter --force
      # Guard both paths: the migrated QueryParameter fixtures and the Legacy/ #[ApiFilter] fixtures.
      - name: Functional suite
        run: vendor/bin/phpunit tests/Functional

  phpstan:
    name: PHPStan (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.5'
      fail-fast: false
    env:
      APP_DEBUG: '1' # https://github.com/phpstan/phpstan-symfony/issues/37
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # https://github.com/staabm/phpstan-todo-by#prerequisite
      -   name: Get tags
          run: git fetch --tags origin
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, mongodb
          coverage: none
          ini-values: memory_limit=-1
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
          composer require --dev doctrine/mongodb-odm-bundle
      - name: Cache PHPStan results
        uses: actions/cache@v5
        with:
          path: /tmp/phpstan
          key: phpstan-php${{ matrix.php }}-${{ github.sha }}
          restore-keys: |
            phpstan-php${{ matrix.php }}-
            phpstan-
        continue-on-error: true
      - name: Clear test app cache
        run: |
          rm -Rf tests/Fixtures/app/var/cache/*
          tests/Fixtures/app/console cache:warmup
      - name: Run PHPStan analysis
        run: |
          ./vendor/bin/phpstan --version
          ./vendor/bin/phpstan analyse --no-interaction --no-progress --ansi
      - name: Install Laravel
        working-directory: 'src/Laravel'
        run: |
          composer global link ../../ --working-directory=$(pwd)
          composer run-script build
      - name: Run PHPStan analysis (laravel)
        working-directory: 'src/Laravel'
        run: |
          ./vendor/bin/phpstan analyse --no-interaction --no-progress --ansi

  redocly-lint:
    name: Lint OpenAPI with Redocly
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.4'
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, bcmath, curl, openssl, mbstring
          ini-values: memory_limit=-1
          tools: composer:2.9.8
          coverage: none
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@latest
      - name: Clear test app cache
        run: |
          rm -Rf tests/Fixtures/app/var/cache/*
          tests/Fixtures/app/console cache:warmup
      - name: Generate OpenAPI spec
        run: |
          mkdir -p /tmp/openapi
          tests/Fixtures/app/console api:openapi:export --output=/tmp/openapi/openapi.json --no-ansi
      - name: Lint OpenAPI spec with Redocly
        run: redocly lint --config .redocly.yaml /tmp/openapi/openapi.json

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php: ${{ fromJSON(github.event_name == 'pull_request' && '["8.2","8.5"]' || '["8.2","8.3","8.4","8.5"]') }}
        include:
          - php: '8.5'
            coverage: true
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, pdo_sqlite
          coverage: pcov
          ini-values: memory_limit=-1
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
      - name: Clear test app cache
        run: tests/Fixtures/app/console cache:clear --ansi
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --log-junit build/logs/phpunit/junit.xml ${{ matrix.coverage && '--coverage-clover build/logs/phpunit/clover.xml' || '' }}
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: phpunit-logs-php${{ matrix.php }}
          path: build/logs/phpunit
        continue-on-error: true
      - name: Upload coverage results to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: build/logs/phpunit
          name: phpunit-php${{ matrix.php }}
          flags: phpunit
          fail_ci_if_error: true
        continue-on-error: true
      - name: Upload coverage results to Coveralls
        if: matrix.coverage
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer global require --prefer-dist --no-interaction --no-progress --ansi php-coveralls/php-coveralls
          export PATH="$PATH:$HOME/.composer/vendor/bin"
          php-coveralls --coverage_clover=build/logs/phpunit/clover.xml
        continue-on-error: true

  phpunit-components:
    name: PHPUnit ${{ matrix.component }} (PHP ${{ matrix.php.version }} ${{ matrix.php.coverage && 'coverage' || '' }}${{ matrix.php.lowest && 'lowest' || '' }}${{ matrix.php.minimal-changes && 'minimal-changes' || '' }}${{ matrix.opensearch && 'opensearch' || '' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - version: '8.2'
          - version: '8.5'
            coverage: true
          - version: '8.5'
            lowest: true
          - version: '8.5'
            minimal-changes: true
        component:
          - api-platform/doctrine-common
          - api-platform/doctrine-orm
          - api-platform/doctrine-odm
          - api-platform/metadata
          - api-platform/hal
          - api-platform/hydra
          - api-platform/json-api
          - api-platform/json-schema
          - api-platform/elasticsearch
          - api-platform/openapi
          - api-platform/graphql
          - api-platform/http-cache
          - api-platform/ramsey-uuid
          - api-platform/serializer
          - api-platform/state
          - api-platform/symfony
          - api-platform/validator
        include:
          - php:
              version: '8.5'
            component: api-platform/elasticsearch
            opensearch: true
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php.version }}
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, pdo_sqlite
          ini-values: memory_limit=-1
      - name: PMU
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
      - name: Linking
        if: ${{ !matrix.php.lowest && !matrix.php.minimal-changes }}
        run: |
          composer global link . --permanent
          composer ${{matrix.component}} update
      - name: Run ${{ matrix.component }} install
        if: ${{ matrix.php.lowest || matrix.php.minimal-changes }}
        run: |
          cd $(composer ${{matrix.component}} --cwd)
          composer update${{ matrix.php.lowest && ' --prefer-lowest --prefer-source' || '' }}${{ matrix.php.minimal-changes && ' --minimal-changes' || '' }}
      - name: Install OpenSearch PHP client
        if: ${{ matrix.opensearch }}
        run: |
          cd $(composer ${{matrix.component}} --cwd)
          composer require --dev opensearch-project/opensearch-php "^2.5" -W
      - name: Run ${{ matrix.component }} tests
        run: |
          mkdir -p /tmp/build/logs/phpunit
          composer ${{matrix.component}} test -- --log-junit "/tmp/build/logs/phpunit/junit.xml" ${{ matrix.php.coverage && '--coverage-clover /tmp/build/logs/phpunit/clover.xml' || '' }}${{ matrix.php.lowest && ' --ignore-baseline' || '' }}
      - name: Run ${{ matrix.component }} tests (no deprecations)
        if: ${{ matrix.php.version == '8.5' && !matrix.php.lowest && !matrix.php.minimal-changes }}
        run: |
          cd $(composer ${{matrix.component}} --cwd)
          ./vendor/bin/phpunit --fail-on-deprecation --display-deprecations
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: phpunit-logs-php${{ matrix.php }}
          path: /tmp/build/logs/phpunit
        continue-on-error: true
      - name: Upload coverage results to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: /tmp/build/logs/phpunit
          name: phpunit-php${{ matrix.php }}
          flags: phpunit
          fail_ci_if_error: true
        continue-on-error: true
      - name: Upload coverage results to Coveralls
        if: matrix.coverage
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer global require --prefer-dist --no-interaction --no-progress --ansi php-coveralls/php-coveralls
          export PATH="$PATH:$HOME/.composer/vendor/bin"
          php-coveralls --coverage_clover=/tmp/build/logs/phpunit/clover.xml
        continue-on-error: true

  postgresql:
    name: PHPUnit (PHP ${{ matrix.php }}) (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.5'
      fail-fast: false
    env:
      APP_ENV: postgres
      DATABASE_URL: postgres://api_platform:apiplatformrocks@localhost/api_platform_test
      PGPASSWORD: apiplatformrocks
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup postgres
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -d template1 -c "CREATE USER api_platform WITH PASSWORD 'apiplatformrocks' CREATEDB"
          createdb -h localhost -p 5432 -U api_platform api_platform_test
          pg_isready -d api_platform_test -h localhost -p 5432 -U api_platform
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, pdo_pgsql
          coverage: none
          ini-values: memory_limit=-1
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
      - name: Clear test app cache
        run: tests/Fixtures/app/console cache:clear --ansi
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit

  mysql:
    name: PHPUnit (PHP ${{ matrix.php }}) (MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.5'
      fail-fast: false
    services:
      mysql:
        image: mariadb:10.5.9
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: api_platform_test
        ports:
          - 3306:3306
    env:
      APP_ENV: mysql
      DATABASE_URL: mysql://root:root@127.0.0.1/api_platform_test
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, pdo_mysql
          coverage: none
          ini-values: memory_limit=-1
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
      - name: Clear test app cache
        run: tests/Fixtures/app/console cache:clear --ansi
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit

  mongodb:
    name: PHPUnit (PHP ${{ matrix.php }}) (MongoDB)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.5'
      fail-fast: false
    env:
      APP_ENV: mongodb
      MONGODB_URL: mongodb://localhost:27017
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup MongoDB
        run: |
          sudo apt update
          sudo apt install -y wget gnupg
          wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
          sudo apt update
          sudo apt install -y mongodb-org
          sudo systemctl start mongod
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, mongodb
          coverage: pcov
          ini-values: memory_limit=-1
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link . --permanent
          composer require --dev doctrine/mongodb-odm-bundle
      - name: Clear test app cache
        run: tests/Fixtures/app/console cache:clear --ansi
      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --log-junit build/logs/phpunit/junit.xml --coverage-clover build/logs/phpunit/clover.xml --exclude-group=orm
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: phpunit-logs-php${{ matrix.php }}-mongodb
          path: build/logs/phpunit
        continue-on-error: true
      - name: Upload coverage results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: build/logs/phpunit
          name: phpunit-php${{ matrix.php }}-mongodb
          flags: phpunit
          fail_ci_if_error: true
        continue-on-error: true
      - name: Upload coverage results to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer global require --prefer-dist --no-interaction --no-progress --ansi php-coveralls/php-coveralls
          export PATH="$PATH:$HOME/.composer/vendor/bin"
          php-coveralls --coverage_clover=build/logs/phpunit/clover.xml
        continue-on-error: true

  mercure:
    name: PHPUnit (PHP ${{ matrix.php }}) (Mercure)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        php:
          - '8.5'
      fail-fast: false
    env:
      APP_ENV: mercure
      MERCURE_URL: 'http://localhost:1337/.well-known/mercure'
      MERCURE_JWT_SECRET: 'eyJhbGciOiJIUzI1NiJ9..KKPIikwUzRuB3DTpVw6ajzwSChwFw5omBMmMcWKiDcM'
    services:
      mercure:
        image: dunglas/mercure
        env:
          SERVER_NAME: :1337
          MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
          MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
          MERCURE_EXTRA_DIRECTIVES: |
            # Custom directives, see https://mercure.rocks/docs/hub/config
            anonymous
            cors_origins *
        ports:
          - 1337:1337
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pecl, composer:2.9.8
          extensions: intl, bcmath, curl, openssl, mbstring, mongodb
          coverage: pcov
          ini-values: memory_limit=-1
      - name: Get composer cache directory
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Update project dependencies
        run: |
          composer global require soyuka/pmu
          composer global config allow-plugins.soyuka/pmu true --no-interaction
          composer global link .
